<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parametric Multi-Joint Flexi-Cutter Direct</title>
    <style>
        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a; color: #ffffff;
            display: flex; height: 100vh; overflow: hidden;
        }
        #sidebar {
            width: 350px; background-color: #262626; padding: 20px;
            display: flex; flex-direction: column; gap: 12px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.5); z-index: 10;
            overflow-y: auto;
        }
        h2 { margin: 0; color: #ff7900; font-size: 20px; }
        h3 { margin: 5px 0 2px 0; font-size: 13px; color: #ff7900; text-transform: uppercase; }
        .control-group { display: flex; flex-direction: column; gap: 3px; }
        label { font-size: 11px; color: #ccc; font-weight: bold; }
        .slider-row { display: flex; align-items: center; gap: 8px; }
        .slider-row span { min-width: 45px; font-size: 11px; color: #ff7900; font-family: monospace; text-align: right; }
        input[type="file"] {
            background: #333; padding: 8px; border-radius: 4px;
            border: 1px dashed #555; cursor: pointer; color: #fff; font-size: 12px;
        }
        input[type="range"] { flex-grow: 1; accent-color: #ff7900; }
        button {
            background-color: #ff7900; color: white; border: none;
            padding: 10px 12px; border-radius: 4px; font-weight: bold;
            cursor: pointer; transition: background 0.2s;
        }
        button:hover { background-color: #e06a00; }
        button:disabled { background-color: #555; cursor: not-allowed; }
        #btn-add-cutter { background-color: #333; border: 1px solid #ff7900; color: #ff7900; margin-bottom: 5px; }
        #btn-add-cutter:hover { background-color: #ff7900; color: white; }
        #canvas-container { flex-grow: 1; position: relative; }
        #loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9); padding: 20px; border-radius: 8px;
            display: none; pointer-events: none; text-align: center;
            border: 1px solid #ff7900; z-index: 100;
        }
        #cutters-container { display: flex; flex-direction: column; gap: 10px; }
        .cutter-panel {
            background: #1e1e1e; padding: 10px; border-radius: 6px;
            border-left: 4px solid #ff7900; display: flex; flex-direction: column; gap: 8px;
            position: relative;
        }
        .panel-header { display: flex; justify-content: space-between; align-items: center; }
        .btn-remove { background: none; color: #ef5350; border: none; padding: 0; cursor: pointer; font-size: 11px; }
        .btn-remove:hover { color: #f44336; text-decoration: underline; }
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "manifold-3d": "https://unpkg.com/manifold-3d@3.0.1/manifold.js"
            }
        }
    </script>
    <script>
        const script = document.createElement('script');
        script.src = `./cutter-data.js?v=${Date.now()}`;
        document.head.appendChild(script);
    </script>
</head>
<body>

    <div id="sidebar">
        <h2>Flexi Link Station Multi</h2>
        
        <div class="control-group">
            <label for="file-input-model">1. Upload Your Target Model:</label>
            <input type="file" id="file-input-model" accept=".stl">
        </div>

        <h3>Cutter Controls</h3>
        <button id="btn-add-cutter" disabled>+ Add Cutter Joint</button>
        
        <div id="cutters-container"></div>

        <button id="btn-cut" disabled style="margin-top: 10px; padding: 14px;">Subtract All Cutters & Download</button>
    </div>

    <div id="canvas-container">
        <div id="loading">Initializing Engine...</div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { STLLoader } from 'three/addons/loaders/STLLoader.js';
        import { STLExporter } from 'three/addons/exporters/STLExporter.js';
        import * as BufferGeometryUtils from 'three/addons/utils/BufferGeometryUtils.js';
        import libmanifold from 'manifold-3d';

        let scene, camera, renderer, controls;
        let mainModelGeom = null;
        let cutterBaseGeom = null; 
        let visualModelMesh = null;
        let wasmModule;

        let activeCutters = [];
        let cutterIdCounter = 0;

        const CUTTER_COLORS = [0xff5500, 0x00ccff, 0x2ecc71, 0x9b59b6, 0xf1c40f, 0xe67e22, 0xe74c3c, 0x1abc9c];

        const modelInput = document.getElementById('file-input-model');
        const btnAddCutter = document.getElementById('btn-add-cutter');
        const cuttersContainer = document.getElementById('cutters-container');
        const btnCut = document.getElementById('btn-cut');
        const loadingDiv = document.getElementById('loading');

        function animate() {
            requestAnimationFrame(animate);
            if (controls) controls.update();
            if (renderer && scene && camera) renderer.render(scene, camera);
        }

        async function startEngine() {
            wasmModule = await libmanifold();
            wasmModule.setup();
            initThree();
        }

        function initThree() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a1a);

            camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 1, 1000);
            camera.position.set(80, 80, 80);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            scene.add(new THREE.AmbientLight(0x777777));
            const dLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dLight.position.set(1, 1, 1);
            scene.add(dLight);

            setTimeout(loadCutterFromMemory, 100);

            window.addEventListener('resize', () => {
                camera.aspect = container.clientWidth / container.clientHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(container.clientWidth, container.clientHeight);
            });
            animate();
        }

        function loadCutterFromMemory() {
            const loader = new STLLoader();
            try {
                let base64Str = window.EMBEDDED_BASE64_STRING || "";
                if (base64Str.includes(',')) base64Str = base64Str.split(',')[1];
                let cleanBase64 = base64Str.replace(/[^A-Za-z0-9\+\/\=]/g, '');
                
                const binaryString = window.atob(cleanBase64);
                let geometry;

                // FIXED: Direct structural analysis loop to check if file structure is plain text ASCII or Binary
                if (binaryString.trim().startsWith('solid')) {
                    console.log("ASCII Text model definition intercepted. Processing text parameters...");
                    geometry = loader.parse(binaryString);
                } else {
                    console.log("Standard Binary file format intercepted. Processing array block matrices...");
                    const bytes = new Uint8Array(binaryString.length);
                    for (let i = 0; i < binaryString.length; i++) {
                        bytes[i] = binaryString.charCodeAt(i);
                    }
                    geometry = loader.parse(bytes.buffer);
                }

                cutterBaseGeom = BufferGeometryUtils.mergeVertices(geometry, 0.001);
                cutterBaseGeom.center();
                cutterBaseGeom.computeVertexNormals();
                cutterBaseGeom.computeBoundingBox();
                console.log("Cutter asset parsing verified complete. Background core standing by.");
            } catch (e) {
                console.error("Cutter structural compilation missing.", e);
            }
        }

        function createCutterUIAndMesh() {
            if (!mainModelGeom || !cutterBaseGeom) return;

            const id = cutterIdCounter++;
            const colorIndex = activeCutters.length % CUTTER_COLORS.length;
            const hexColor = CUTTER_COLORS[colorIndex];

            const mesh = new THREE.Mesh(cutterBaseGeom, new THREE.MeshStandardMaterial({
                color: hexColor, transparent: true, opacity: 0.6
            }));
            scene.add(mesh);

            const bbox = mainModelGeom.boundingBox;
            const minX = (bbox.min.x * 2).toFixed(0); const maxX = (bbox.max.x * 2).toFixed(0);
            const minY = (bbox.min.y * 2).toFixed(0); const maxY = (bbox.max.y * 2).toFixed(0);
            const minZ = (bbox.min.z * 2).toFixed(0); const maxZ = (bbox.max.z * 2).toFixed(0);

            const panel = document.createElement('div');
            panel.className = 'cutter-panel';
            panel.id = `panel-${id}`;
            panel.style.borderLeftColor = `#${hexColor.toString(16).padStart(6, '0')}`;
            panel.innerHTML = `
                <div class="panel-header">
                    <label style="color:#${hexColor.toString(16).padStart(6, '0')}; font-size:12px;">Joint Cutter #${activeCutters.length + 1}</label>
                    <button class="btn-remove" data-id="${id}">Remove</button>
                </div>
                <div class="control-group">
                    <label>Scale: <span id="lbl-scale-${id}">100%</span></label>
                    <input type="range" id="scale-${id}" min="20" max="200" step="5" value="100">
                </div>
                <div class="control-group">
                    <label>Position X / Y / Z</label>
                    <div class="slider-row"><input type="range" id="x-${id}" min="${minX}" max="${maxX}" step="0.2" value="0"><span id="lbl-x-${id}">0.0</span></div>
                    <div class="slider-row"><input type="range" id="y-${id}" min="${minY}" max="${maxY}" step="0.2" value="0"><span id="lbl-y-${id}">0.0</span></div>
                    <div class="slider-row"><input type="range" id="z-${id}" min="${minZ}" max="${maxZ}" step="0.2" value="0"><span id="lbl-z-${id}">0.0</span></div>
                </div>
                <div class="control-group">
                    <label>Rotation X / Y / Z (°)</label>
                    <div class="slider-row"><input type="range" id="rx-${id}" min="-180" max="180" step="5" value="0"><span id="lbl-rx-${id}">0°</span></div>
                    <div class="slider-row"><input type="range" id="ry-${id}" min="-180" max="180" step="5" value="0"><span id="lbl-ry-${id}">0°</span></div>
                    <div class="slider-row"><input type="range" id="rz-${id}" min="-180" max="180" step="5" value="0"><span id="lbl-rz-${id}">0°</span></div>
                </div>
            `;
            cuttersContainer.appendChild(panel);

            const cutterObj = {
                id: id,
                mesh: mesh,
                elScale: panel.querySelector(`#scale-${id}`),
                elX: panel.querySelector(`#x-${id}`), elY: panel.querySelector(`#y-${id}`), elZ: panel.querySelector(`#z-${id}`),
                elRx: panel.querySelector(`#rx-${id}`), elRy: panel.querySelector(`#ry-${id}`), elRz: panel.querySelector(`#rz-${id}`),
                lblScale: panel.querySelector(`#lbl-scale-${id}`),
                lblX: panel.querySelector(`#lbl-x-${id}`), lblY: panel.querySelector(`#lbl-y-${id}`), lblZ: panel.querySelector(`#lbl-z-${id}`),
                lblRx: panel.querySelector(`#lbl-rx-${id}`), lblRy: panel.querySelector(`#lbl-ry-${id}`), lblRz: panel.querySelector(`#lbl-rz-${id}`)
            };

            const syncTransform = () => {
                const s = parseFloat(cutterObj.elScale.value) / 100;
                mesh.scale.set(s, s, s);
                mesh.position.set(parseFloat(cutterObj.elX.value), parseFloat(cutterObj.elY.value), parseFloat(cutterObj.elZ.value));
                mesh.rotation.set(
                    THREE.MathUtils.degToRad(parseFloat(cutterObj.elRx.value)),
                    THREE.MathUtils.degToRad(parseFloat(cutterObj.elRy.value)),
                    THREE.MathUtils.degToRad(parseFloat(cutterObj.elRz.value))
                );
                cutterObj.lblScale.innerText = `${cutterObj.elScale.value}%`;
                cutterObj.lblX.innerText = parseFloat(cutterObj.elX.value).toFixed(1);
                cutterObj.lblY.innerText = parseFloat(cutterObj.elY.value).toFixed(1);
                cutterObj.lblZ.innerText = parseFloat(cutterObj.elZ.value).toFixed(1);
                cutterObj.lblRx.innerText = `${cutterObj.elRx.value}°`;
                cutterObj.lblRy.innerText = `${cutterObj.elRy.value}°`;
                cutterObj.lblRz.innerText = `${cutterObj.elRz.value}°`;
            };

            ['elScale', 'elX', 'elY', 'elZ', 'elRx', 'elRy', 'elRz'].forEach(prop => {
                cutterObj[prop].addEventListener('input', syncTransform);
            });

            panel.querySelector('.btn-remove').addEventListener('click', () => {
                scene.remove(mesh);
                panel.remove();
                activeCutters = activeCutters.filter(c => c.id !== id);
                reindexLabels();
            });

            activeCutters.push(cutterObj);
        }

        function reindexLabels() {
            activeCutters.forEach((c, idx) => {
                const label = document.querySelector(`#panel-${c.id} .panel-header label`);
                if (label) label.innerText = `Joint Cutter #${idx + 1}`;
            });
        }

        btnAddCutter.addEventListener('click', createCutterUIAndMesh);

        modelInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            loadingDiv.innerText = "Loading Model...";
            loadingDiv.style.display = 'block';

            activeCutters.forEach(c => scene.remove(c.mesh));
            cuttersContainer.innerHTML = "";
            activeCutters = [];

            setTimeout(async () => {
                const buffer = await file.arrayBuffer();
                const loader = new STLLoader();
                let parsed = loader.parse(buffer);

                mainModelGeom = BufferGeometryUtils.mergeVertices(parsed, 0.001);
                mainModelGeom.center();
                mainModelGeom.computeVertexNormals();
                mainModelGeom.computeBoundingBox();

                if (visualModelMesh) scene.remove(visualModelMesh);
                visualModelMesh = new THREE.Mesh(mainModelGeom, new THREE.MeshStandardMaterial({ color: 0x90caf9, roughness: 0.5 }));
                scene.add(visualModelMesh);

                mainModelGeom.computeBoundingSphere();
                const r = mainModelGeom.boundingSphere.radius;
                camera.position.set(r * 1.8, r * 1.8, r * 1.8);
                controls.target.set(0,0,0);

                btnAddCutter.disabled = false;
                btnCut.disabled = false;
                
                createCutterUIAndMesh();
                loadingDiv.style.display = 'none';
            }, 50);
        });

        btnCut.addEventListener('click', () => {
            if (!mainModelGeom || activeCutters.length === 0) return;
            loadingDiv.innerText = "Executing Multi-Subtraction...";
            loadingDiv.style.display = 'block';

            setTimeout(() => {
                try {
                    const { Manifold, Mesh } = wasmModule;

                    const toMesh = (g) => {
                        let pos = g.attributes.position.array;
                        let indexArray = g.index ? g.index.array : null;
                        
                        let triVerts;
                        if (indexArray) {
                            triVerts = new Uint32Array(indexArray);
                        } else {
                            let count = pos.length / 3;
                            triVerts = new Uint32Array(count);
                            for (let i = 0; i < count; i++) triVerts[i] = i;
                        }
                        return new Mesh({ numProp: 3, triVerts: triVerts, vertProperties: new Float32Array(pos) });
                    };

                    let baseM = new Manifold(toMesh(mainModelGeom));

                    for (let cutter of activeCutters) {
                        let cutM = new Manifold(toMesh(cutterBaseGeom));

                        const baseScale = parseFloat(cutter.elScale.value) / 100;
                        const mathOvershootFactor = 1.0001; 
                        const finalScale = baseScale * mathOvershootFactor;

                        cutM = cutM.scale([finalScale, finalScale, finalScale]);
                        cutM = cutM.rotate([parseFloat(cutter.elRx.value), parseFloat(cutter.elRy.value), parseFloat(cutter.elRz.value)]);
                        
                        const shiftX = parseFloat(cutter.elX.value) + 0.0005;
                        const shiftY = parseFloat(cutter.elY.value) + 0.0005;
                        const shiftZ = parseFloat(cutter.elZ.value) + 0.0005;
                        cutM = cutM.translate([shiftX, shiftY, shiftZ]);
                        
                        let tempRes = Manifold.difference(baseM, cutM);
                        baseM.delete();
                        cutM.delete();
                        baseM = tempRes;
                    }

                    const out = baseM.getMesh();

                    const finalGeom = new THREE.BufferGeometry();
                    finalGeom.setAttribute('position', new THREE.BufferAttribute(out.vertProperties, 3));
                    finalGeom.setIndex(new THREE.BufferAttribute(out.triVerts, 1));
                    finalGeom.computeVertexNormals();

                    scene.remove(visualModelMesh);
                    visualModelMesh = new THREE.Mesh(finalGeom, new THREE.MeshStandardMaterial({ color: 0x4caf50, roughness: 0.4 }));
                    scene.add(visualModelMesh);

                    const exporter = new STLExporter();
                    const stlBytes = exporter.parse(visualModelMesh, { binary: true });
                    const blob = new Blob([stlBytes], { type: 'application/octet-stream' });
                    
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = 'multi_flexi_subtracted_output.stl';
                    a.click();

                    baseM.delete();
                } catch (e) {
                    console.error("Multi-subtraction execution failed.", e);
                } finally {
                    loadingDiv.style.display = 'none';
                }
            }, 50);
        });

        startEngine();
    </script>
</body>
</html>
