<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parametric Joint Flexi-Cutter Direct</title>
    <style>
        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a; color: #ffffff;
            display: flex; height: 100vh; overflow: hidden;
        }
        #sidebar {
            width: 340px; background-color: #262626; padding: 20px;
            display: flex; flex-direction: column; gap: 15px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.5); z-index: 10;
        }
        h2 { margin-top: 0; color: #ff7900; font-size: 20px; }
        h3 { margin: 5px 0; font-size: 13px; color: #ff7900; text-transform: uppercase; }
        .control-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 12px; color: #ccc; font-weight: bold; }
        input[type="file"] {
            background: #333; padding: 8px; border-radius: 4px;
            border: 1px dashed #555; cursor: pointer; color: #fff; font-size: 12px;
        }
        input[type="range"] { width: 100%; accent-color: #ff7900; }
        button {
            background-color: #ff7900; color: white; border: none;
            padding: 12px; border-radius: 4px; font-weight: bold;
            cursor: pointer; transition: background 0.2s;
        }
        button:hover { background-color: #e06a00; }
        button:disabled { background-color: #555; cursor: not-allowed; }
        #canvas-container { flex-grow: 1; position: relative; }
        #loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9); padding: 20px; border-radius: 8px;
            display: none; pointer-events: none; text-align: center;
            border: 1px solid #ff7900; z-index: 100;
        }
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "manifold-3d": "https://unpkg.com/manifold-3d@3.0.1/manifold.js"
            }
        }
    </script>
    <script src="./cutter-data.js"></script>
</head>
<body>

    <div id="sidebar">
        <h2>Flexi Link Station</h2>
        
        <div class="control-group">
            <label for="file-input-model">1. Upload Your Target Model:</label>
            <input type="file" id="file-input-model" accept=".stl">
        </div>

        <hr style="border-color: #444; margin: 5px 0;">

        <h3>2. Adjust Cutter Dimensions</h3>
        <div class="control-group">
            <label id="label-scale" for="input-scale">Cutter Scale: 100%</label>
            <input type="range" id="input-scale" min="20" max="200" step="5" value="100" disabled>
        </div>

        <h3>3. Position Joint Link</h3>
        <div class="control-group">
            <label id="label-pos-x" for="input-pos-x">Position X: 0.00</label>
            <input type="range" id="input-pos-x" min="-100" max="100" step="0.2" value="0" disabled>
        </div>
        <div class="control-group">
            <label id="label-pos-y" for="input-pos-y">Position Y: 0.00</label>
            <input type="range" id="input-pos-y" min="-100" max="100" step="0.2" value="0" disabled>
        </div>
        <div class="control-group">
            <label id="label-pos-z" for="input-pos-z">Position Z: 0.00</label>
            <input type="range" id="input-pos-z" min="-100" max="100" step="0.2" value="0" disabled>
        </div>

        <hr style="border-color: #444; margin: 5px 0;">

        <button id="btn-cut" disabled>Subtract Cutter & Download</button>
    </div>

    <div id="canvas-container">
        <div id="loading">Initializing Engine...</div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { STLLoader } from 'three/addons/loaders/STLLoader.js';
        import { STLExporter } from 'three/addons/exporters/STLExporter.js';
        import * as BufferGeometryUtils from 'three/addons/utils/BufferGeometryUtils.js';
        import libmanifold from 'manifold-3d';

        let scene, camera, renderer, controls;
        let mainModelGeom = null;
        let cutterGeom = null;
        let visualModelMesh = null;
        let visualCutterMesh = null;
        let wasmModule;

        const modelInput = document.getElementById('file-input-model');
        const scaleInput = document.getElementById('input-scale');
        const posX = document.getElementById('input-pos-x');
        const posY = document.getElementById('input-pos-y');
        const posZ = document.getElementById('input-pos-z');
        const btnCut = document.getElementById('btn-cut');
        const loadingDiv = document.getElementById('loading');

        // Render loop defined early so it can be safely called anywhere
        function animate() {
            requestAnimationFrame(animate);
            if (controls) controls.update();
            if (renderer && scene && camera) renderer.render(scene, camera);
        }

        posX.addEventListener('input', (e) => {
            document.getElementById('label-pos-x').innerText = `Position X: ${parseFloat(e.target.value).toFixed(2)}`;
            if(visualCutterMesh) visualCutterMesh.position.x = parseFloat(e.target.value);
        });
        posY.addEventListener('input', (e) => {
            document.getElementById('label-pos-y').innerText = `Position Y: ${parseFloat(e.target.value).toFixed(2)}`;
            if(visualCutterMesh) visualCutterMesh.position.y = parseFloat(e.target.value);
        });
        posZ.addEventListener('input', (e) => {
            document.getElementById('label-pos-z').innerText = `Position Z: ${parseFloat(e.target.value).toFixed(2)}`;
            if(visualCutterMesh) visualCutterMesh.position.z = parseFloat(e.target.value);
        });

        scaleInput.addEventListener('input', (e) => {
            const factor = parseFloat(e.target.value) / 100;
            document.getElementById('label-scale').innerText = `Cutter Scale: ${e.target.value}%`;
            if(visualCutterMesh) visualCutterMesh.scale.set(factor, factor, factor);
        });

        async function startEngine() {
            wasmModule = await libmanifold();
            wasmModule.setup();
            initThree();
        }

        function initThree() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a1a);

            camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 1, 1000);
            camera.position.set(60, 60, 60);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            scene.add(new THREE.AmbientLight(0x777777));
            const dLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dLight.position.set(1, 1, 1);
            scene.add(dLight);

            loadCutterFromMemory();

            window.addEventListener('resize', () => {
                camera.aspect = container.clientWidth / container.clientHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(container.clientWidth, container.clientHeight);
            });
            animate();
        }

        function loadCutterFromMemory() {
            const loader = new STLLoader();
            try {
                let base64Str = window.EMBEDDED_BASE64_STRING || "";
                if (base64Str.includes(',')) base64Str = base64Str.split(',')[1];
                let cleanBase64 = base64Str.replace(/[^A-Za-z0-9\+\/\=]/g, '');
                const binaryString = window.atob(cleanBase64);
                const bytes = new Uint8Array(binaryString.length);
                for (let i = 0; i < binaryString.length; i++) {
                    bytes[i] = binaryString.charCodeAt(i);
                }
                
                let geometry = loader.parse(bytes.buffer);
                cutterGeom = BufferGeometryUtils.mergeVertices(geometry, 0.01);
                cutterGeom.center();
                cutterGeom.computeVertexNormals();

                visualCutterMesh = new THREE.Mesh(cutterGeom, new THREE.MeshStandardMaterial({ 
                    color: 0xff5500, transparent: true, opacity: 0.6 
                }));
                visualCutterMesh.visible = false;
                scene.add(visualCutterMesh);
            } catch (e) {
                console.error("Cutter geometry parse failure.", e);
            }
        }

        modelInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            loadingDiv.innerText = "Loading Model...";
            loadingDiv.style.display = 'block';

            setTimeout(async () => {
                const buffer = await file.arrayBuffer();
                const loader = new STLLoader();
                let parsed = loader.parse(buffer);

                mainModelGeom = BufferGeometryUtils.mergeVertices(parsed, 0.01);
                mainModelGeom.center();
                mainModelGeom.computeVertexNormals();
                mainModelGeom.computeBoundingBox();

                const bbox = mainModelGeom.boundingBox;
                posX.min = (bbox.min.x * 2).toFixed(0); posX.max = (bbox.max.x * 2).toFixed(0);
                posY.min = (bbox.min.y * 2).toFixed(0); posY.max = (bbox.max.y * 2).toFixed(0);
                posZ.min = (bbox.min.z * 2).toFixed(0); posZ.max = (bbox.max.z * 2).toFixed(0);
                
                posX.value = 0; posY.value = 0; posZ.value = 0;
                scaleInput.value = 100;

                posX.disabled = false; posY.disabled = false; posZ.disabled = false; scaleInput.disabled = false;

                if (visualModelMesh) scene.remove(visualModelMesh);
                visualModelMesh = new THREE.Mesh(mainModelGeom, new THREE.MeshStandardMaterial({ color: 0x90caf9, roughness: 0.5 }));
                scene.add(visualModelMesh);

                if(visualCutterMesh) {
                    visualCutterMesh.position.set(0,0,0);
                    visualCutterMesh.scale.set(1,1,1);
                    visualCutterMesh.visible = true;
                }

                mainModelGeom.computeBoundingSphere();
                const r = mainModelGeom.boundingSphere.radius;
                camera.position.set(r * 1.8, r * 1.8, r * 1.8);
                controls.target.set(0,0,0);

                btnCut.disabled = false;
                loadingDiv.style.display = 'none';
            }, 50);
        });

        btnCut.addEventListener('click', () => {
            if (!mainModelGeom || !cutterGeom) return;
            loadingDiv.innerText = "Executing Subtraction...";
            loadingDiv.style.display = 'block';

            setTimeout(() => {
                try {
                    const toMesh = (g) => {
                        const pos = g.attributes.position.array;
                        let idx = g.index ? Array.from(g.index.array) : [];
                        if (idx.length === 0) for(let i=0; i<pos.length/3; i++) idx.push(i);
                        return { numProp: 3, triVerts: new Uint32Array(idx), vertProperties: new Float32Array(pos) };
                    };

                    let baseM = wasmModule.Manifold.fromMesh(toMesh(mainModelGeom));
                    let cutM = wasmModule.Manifold.fromMesh(toMesh(cutterGeom));

                    const s = parseFloat(scaleInput.value) / 100;
                    cutM = cutM.scale([s, s, s]);
                    cutM = cutM.translate([parseFloat(posX.value), parseFloat(posY.value), parseFloat(posZ.value)]);
                    
                    let resM = wasmModule.Manifold.difference(baseM, cutM);
                    const out = resM.getMesh();

                    const finalGeom = new THREE.BufferGeometry();
                    finalGeom.setAttribute('position', new THREE.BufferAttribute(out.vertProperties, 3));
                    finalGeom.setIndex(new THREE.BufferAttribute(out.triVerts, 1));
                    finalGeom.computeVertexNormals();

                    scene.remove(visualModelMesh);
                    visualModelMesh = new THREE.Mesh(finalGeom, new THREE.MeshStandardMaterial({ color: 0x4caf50, roughness: 0.4 }));
                    scene.add(visualModelMesh);

                    const exporter = new STLExporter();
                    const stlBytes = exporter.parse(visualModelMesh, { binary: true });
                    const blob = new Blob([stlBytes], { type: 'application/octet-stream' });
                    
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = 'flexi_subtracted_output.stl';
                    a.click();

                    baseM.delete(); cutM.delete(); resM.delete();
                } catch (e) {
                    console.error("Subtraction execution failed.", e);
                } finally {
                    loadingDiv.style.display = 'none';
                }
            }, 50);
        });

        startEngine();
    </script>
</body>
</html>
